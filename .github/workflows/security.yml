name: Security Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  gitleaks:
    name: Gitleaks Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bandit:
    name: Bandit Python Security Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Bandit and converter
        run: pip install bandit bandit-sarif-formatter

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Bandit
        run: bandit -r app/app.py -f json -o reports/bandit-report.json || true

      - name: Convert Bandit JSON to SARIF
        run: |
          python3 -c "
          import json, sys

          with open('reports/bandit-report.json') as f:
              data = json.load(f)

          results = []
          rules = []
          rule_ids = set()

          for result in data.get('results', []):
              rule_id = result['test_id']
              if rule_id not in rule_ids:
                  rule_ids.add(rule_id)
                  rules.append({
                      'id': rule_id,
                      'name': result['test_name'],
                      'shortDescription': {'text': result['test_name']},
                      'helpUri': 'https://bandit.readthedocs.io'
                  })
              severity_map = {'LOW': 'warning', 'MEDIUM': 'error', 'HIGH': 'error'}
              results.append({
                  'ruleId': rule_id,
                  'level': severity_map.get(result['issue_severity'], 'warning'),
                  'message': {'text': result['issue_text']},
                  'locations': [{
                      'physicalLocation': {
                          'artifactLocation': {'uri': result['filename']},
                          'region': {'startLine': result['line_number']}
                      }
                  }]
              })

          sarif = {
              'version': '2.1.0',
              '\$schema': 'https://json.schemastore.org/sarif-2.1.0.json',
              'runs': [{
                  'tool': {
                      'driver': {
                          'name': 'Bandit',
                          'version': '1.9.4',
                          'rules': rules
                      }
                  },
                  'results': results
              }]
          }

          with open('reports/bandit-report.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)

          print(f'Converted {len(results)} findings to SARIF')
          "

      - name: Upload Bandit SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/bandit-report.sarif
          category: bandit

  semgrep:
    name: Semgrep SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        run: semgrep scan --config=auto app/ --sarif --output=reports/semgrep-report.sarif || true

      - name: Upload Semgrep SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: reports/semgrep-report.sarif
          category: semgrep

  pip-audit:
    name: pip-audit SCA Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run pip-audit
        run: pip-audit -r app/requirements.txt -o reports/pip-audit-report.json -f json || true

      - name: Upload pip-audit Report
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: reports/pip-audit-report.json

  syft-sbom:
    name: Syft SBOM Generation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t secureapp app/

      - name: Install Syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run Syft
        run: syft secureapp:latest -o cyclonedx-json > reports/sbom.json

      - name: Upload SBOM Report
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: reports/sbom.json

  trivy:
    name: Trivy Container Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t secureapp app/
      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: secureapp:latest
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json
  checkov:
    name: Checkov IaC Scan
    runs-on: ubuntu-latest
    needs: [gitleaks, bandit, semgrep]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform/
          framework: terraform
          soft_fail: false
          output_format: sarif
          output_file_path: results.sarif

      - name: Upload Checkov report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-report
          path: results.sarif

  deploy:
    name: Build and Deploy to ECS
    runs-on: ubuntu-latest
    needs: [checkov]
    permissions:
      id-token: write
      contents: read
    outputs:
      app_url: ${{ steps.get-ip.outputs.app_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::860959037048:role/secureapp-github-actions
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: secureapp-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG app/
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Download task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition secureapp-app \
            --query taskDefinition \
            > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: secureapp-app
          image: 860959037048.dkr.ecr.us-east-1.amazonaws.com/secureapp-app:${{ github.sha }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: secureapp-service
          cluster: secureapp-cluster
          wait-for-service-stability: true
      - name: Get ECS task public IP
        id: get-ip
        run: |
          TASK_ARN=$(aws ecs list-tasks \
            --cluster secureapp-cluster \
            --service-name secureapp-service \
            --query 'taskArns[0]' \
            --output text \
            --region us-east-1)

          ENI_ID=$(aws ecs describe-tasks \
            --cluster secureapp-cluster \
            --tasks $TASK_ARN \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
            --output text \
            --region us-east-1)

          PUBLIC_IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids $ENI_ID \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text \
            --region us-east-1)

          echo "app_url=http://$PUBLIC_IP:5000" >> $GITHUB_OUTPUT

  zap:
    name: OWASP ZAP DAST Scan
    runs-on: ubuntu-latest
    needs: [deploy]
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Fix workspace permissions for ZAP
        run: chmod a+w ${{ github.workspace }}

      - name: Run ZAP Baseline Scan
        continue-on-error: true
        uses: zaproxy/action-baseline@v0.10.0
        with:
          target: ${{ needs.deploy.outputs.app_url }}
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-I"
          fail_action: false

      - name: Check ZAP results
        run: |
          if [ -f report_json.json ]; then
            HIGH=$(cat report_json.json | python3 -c "
          import json,sys
          data=json.load(sys.stdin)
          alerts=[a for s in data.get('site',[]) for a in s.get('alerts',[]) if int(a.get('riskcode',0)) >= 3]
          print(len(alerts))
          ")
            echo "High/Critical findings: $HIGH"
            if [ "$HIGH" -gt "0" ]; then
              echo "Pipeline failed: ZAP found $HIGH HIGH or CRITICAL findings"
              exit 1
            fi
          fi
          echo "ZAP scan passed"
